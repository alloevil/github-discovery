name: Daily Discovery

on:
  # NOTE: Daily scheduled run is handled by the external "openclaw" runner
  # (~12:00 Beijing time). The GitHub Actions cron is disabled to avoid
  # sending the digest email twice per day. Manual trigger remains available.
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Discovery
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/main.py

      - name: Generate index.html
        run: |
          python3 scripts/generate_site.py

      - name: Commit and push
        run: |
          git config user.name "github-discovery-bot"
          git config user.email "bot@github-discovery"
          git add output/ dist/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Daily discovery $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
