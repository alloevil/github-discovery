name: Deploy to Pages

# Content (discovery + email + site generation) is produced by the external
# "openclaw" runner, which pushes output/ and docs/ to main once a day.
# This workflow's ONLY job is to publish docs/ to the gh-pages branch.
# It deliberately does NOT run scripts/main.py — doing so would send a
# second daily email and create a push -> trigger -> push loop.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:  # Allow manual deploy

permissions:
  contents: write
  pages: write

# Avoid overlapping deploys if several docs/ pushes land close together
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
